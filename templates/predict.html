{% extends "base.html" %}

{% block title %}New Analysis | SkinAI{% endblock %}

{% block content %}
<section class="page-header fade-in">
    <div>
        <p class="eyebrow">Medical image analysis</p>
        <h1>New Analysis</h1>
    </div>
    <a class="btn btn-outline-secondary" href="/dashboard">
        <i class="bi bi-arrow-left" aria-hidden="true"></i>
        Back
    </a>
</section>

<section class="analysis-layout fade-in stagger-1">
    <form method="POST"
          enctype="multipart/form-data"
          class="form-card form-stack">
        <div class="form-grid">
            <div class="field">
                <label for="name">Patient name</label>
                <div class="input-shell">
                    <i class="bi bi-person-vcard" aria-hidden="true"></i>
                    <input class="form-control"
                           id="name"
                           type="text"
                           name="name"
                           placeholder="Full name"
                           required>
                </div>
            </div>

            <div class="field">
                <label for="age">Age</label>
                <div class="input-shell">
                    <i class="bi bi-calendar3" aria-hidden="true"></i>
                    <input class="form-control"
                           id="age"
                           type="number"
                           name="age"
                           min="0"
                           placeholder="Age"
                           required>
                </div>
            </div>
        </div>

        <div class="field">
            <label for="image">Lesion image</label>
            <label class="upload-zone" for="image">
                <span class="upload-icon">
                    <i class="bi bi-cloud-arrow-up" aria-hidden="true"></i>
                </span>
                <span class="upload-copy">
                    <strong>Upload medical image</strong>
                    <small>PNG, JPG, or JPEG image file</small>
                </span>
                <input class="form-control"
                       id="image"
                       type="file"
                       name="image"
                       accept="image/*"
                       required>
            </label>
        </div>

        <button class="btn btn-primary btn-analyze" type="submit">
            <i class="bi bi-stars" aria-hidden="true"></i>
            Analyze Image
        </button>
    </form>

    <aside class="insight-card">
        <span class="icon-chip">
            <i class="bi bi-graph-up-arrow" aria-hidden="true"></i>
        </span>
        <h2>AI imaging workflow</h2>
        <p>Structured patient input, image capture, model inference, and report generation in a focused clinical workspace.</p>
    </aside>
</section>
{% endblock %}
